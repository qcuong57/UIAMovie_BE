services:
  postgres:
    image: postgres:17
    container_name: postgres-uiamovie
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: UIAMovieDB
    ports:
      - "5434:5432"
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis-uiamovie
    ports:
      - "6379:6379"
    restart: unless-stopped

